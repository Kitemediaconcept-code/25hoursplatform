<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Your Workspace — 25 Hours Platform</title>
  <meta name="description" content="Log in or register your student account. Access your metrics, active cohorts, code reviews, and verified practitioner credentials.">
  
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav id="navbar" class="nav">
    <a class="nav__logo" href="index.html">
      <img src="assets/images/logo.png" alt="25 Hours" class="nav__logo-img">
    </a>
    <ul class="nav__links">
      <li><a href="courses.html">Courses</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="instructors.html">Instructors</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav__right">
      <a href="login.html" class="btn btn--text active">Log in</a>
      <a href="dashboard.html" class="btn btn--ghost">Dashboard</a>
      <button class="nav__hamburger" id="hamburgerBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </nav>

  <!-- MOBILE NAV -->
  <div class="mobile-nav" id="mobileNav">
    <ul class="mobile-nav__links">
      <li><a href="courses.html">Courses</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="instructors.html">Instructors</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html">Log In</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </div>

  <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 24px; position: relative; background-image: radial-gradient(var(--border-gold) 1px, transparent 1px); background-size: 24px 24px;">
    
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 50% 0%, rgba(201, 162, 39, 0.05) 0%, transparent 60%); pointer-events: none;"></div>

    <div class="auth-card reveal" style="position: relative; z-index: 10;">
      
      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="loginForm">Log In</button>
        <button class="auth-tab" data-form="registerForm">Register</button>
      </div>

      <!-- LOG IN FORM -->
      <form id="loginForm" class="auth-form active" action="dashboard.html">
        <div style="margin-bottom: 24px;">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="rahul@example.com" required>
        </div>

        <div style="margin-bottom: 24px;">
          <div class="flex justify-between items-center" style="margin-bottom: 8px;">
            <label class="form-label" for="loginPassword" style="margin-bottom: 0;">Password</label>
            <a href="faq.html" style="font-size: 12px; color: var(--gold); text-decoration: none;">Forgot?</a>
          </div>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
        </div>

        <div class="flex items-center gap-8" style="margin-bottom: 32px;">
          <input type="checkbox" id="rememberMe" style="width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer;">
          <label for="rememberMe" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn btn--primary w-full">Sign In</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form" action="dashboard.html">
        <div style="margin-bottom: 24px;">
          <label class="form-label" for="regName">Full Name</label>
          <input type="text" id="regName" class="form-input" placeholder="Rahul Sharma" required>
        </div>

        <div style="margin-bottom: 24px;">
          <label class="form-label" for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="form-input" placeholder="rahul@example.com" required>
        </div>

        <div style="margin-bottom: 24px;">
          <label class="form-label" for="regPassword">Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Minimum 8 characters" required minlength="8">
        </div>

        <div class="flex items-center gap-8" style="margin-bottom: 32px;">
          <input type="checkbox" id="agreeTerms" style="width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer;" required>
          <label for="agreeTerms" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">I agree to the <a href="terms.html" style="color: var(--gold); text-decoration: none;">Terms & Policies</a></label>
        </div>

        <button type="submit" class="btn btn--primary w-full">Create Account</button>
      </form>

    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
