    </ul>
    <div class="nav-right">

        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <line x1="21" y1="12" x2="23" y2="12"></line>

      <a href="dashboard.html" class="btn btn-primary">Dashboard</a>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav-overlay" id="mobileNav">
    <ul class="mobile-nav-links">
      <li><a href="courses.html">Courses</a></li>

      <li><a href="login.html">Log In</a></li>

    </ul>
  </div>

  <!-- AUTH MAIN CONTAINER -->
  <main class="auth-container" style="background: var(--hero-grid-radial);">
    <div class="auth-card reveal">
      <!-- Tabs header toggle switchers -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="loginForm">Log In</button>
        <button class="auth-tab" data-form="registerForm">Register</button>
      </div>

      <!-- Tab 1: Log In -->
      <form id="loginForm" class="auth-form active" action="dashboard.html">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="rahul@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label class="form-label" for="loginPassword" style="margin-bottom:0;">Password</label>
            <a href="faq.html" style="font-size:12px; color:var(--primary-color); text-decoration:none;">Forgot?</a>
          </div>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="form-group" style="display:flex; align-items:center; gap:8px; margin-bottom:32px;">
          <input type="checkbox" id="rememberMe" style="width:16px; height:16px; accent-color:var(--primary-color);">
          <label for="rememberMe" style="font-size:13.5px; color:var(--text-muted); cursor:pointer;">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In →</button>
      </form>

      <!-- Tab 2: Register -->
      <form id="registerForm" class="auth-form" action="dashboard.html">
        <div class="form-group">
          <label class="form-label" for="regName">Full Name</label>
          <input type="text" id="regName" class="form-input" placeholder="Rahul Sharma" required autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="form-input" placeholder="rahul@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Minimum 8 characters" required autocomplete="new-password" minlength="8">
        </div>

        <div class="form-group" style="display:flex; align-items:center; gap:8px; margin-bottom:32px;">
          <input type="checkbox" id="agreeTerms" style="width:16px; height:16px; accent-color:var(--primary-color);" required>
          <label for="agreeTerms" style="font-size:13.5px; color:var(--text-muted); cursor:pointer;">I agree to the <a href="terms.html" style="color:var(--primary-color); text-decoration:none;">Terms & Policies</a></label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account →</button>
      </form>
    </div>
  </main>

  <!-- SMALLER LEGAL FOOTER FOR AUTH PAGE -->
  <footer style="padding: 32px 0; background: var(--bg-secondary); border-top: 1px solid var(--border-color);">
    <div class="container" style="text-align: center;">
      <span class="footer-copy">© 2026 25 Hours Platform. Production-Ready EdTech.</span>
      <div class="footer-legal-links" style="justify-content: center; margin-top: 8px;">
        <a href="terms.html">Terms of Service</a>
        <a href="terms.html">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
